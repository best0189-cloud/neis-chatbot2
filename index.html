<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나이스 플러스 도우미 | 송림초등학교</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  #app{width:100%;max-width:700px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.10);display:flex;flex-direction:column;height:90vh;max-height:720px;overflow:hidden}
  .header{padding:14px 20px;background:#1a4f8a;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .header-icon{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .header-icon svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .header-title{color:#fff;font-size:15px;font-weight:700}
  .header-sub{color:rgba(255,255,255,0.75);font-size:12px;margin-top:2px}
  .badge{margin-left:auto;background:rgba(255,255,255,0.2);color:#fff;font-size:11px;padding:4px 10px;border-radius:999px}
  #messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;background:#f7f9fc}
  .msg{display:flex;gap:8px;align-items:flex-end}
  .msg.user{flex-direction:row-reverse}
  .avatar{width:30px;height:30px;border-radius:50%;background:#1a4f8a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .avatar svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .bubble{max-width:76%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
  .bubble.bot{background:#fff;border:1px solid #dde6f0;border-radius:18px 18px 18px 4px;color:#1e2a38}
  .bubble.user{background:#1a4f8a;color:#fff;border-radius:18px 18px 4px 18px}
  .typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#93aac8;margin:0 2px;animation:bounce 1s infinite}
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
  .quick-wrap{padding:0 18px 10px;display:flex;flex-wrap:wrap;gap:6px;background:#f7f9fc}
  .quick-btn{font-size:12px;padding:6px 12px;border-radius:999px;border:1.5px solid #1a4f8a;background:#fff;color:#1a4f8a;cursor:pointer;transition:background .15s}
  .quick-btn:hover{background:#e8f0fb}
  .inputbar{padding:12px 14px;border-top:1px solid #e2e8f0;display:flex;gap:8px;align-items:flex-end;background:#fff}
  #userInput{flex:1;border:1.5px solid #c5d5e8;border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;resize:none;outline:none;max-height:100px;line-height:1.5;transition:border .2s}
  #userInput:focus{border-color:#1a4f8a}
  #sendBtn{width:40px;height:40px;border-radius:50%;border:none;background:#1a4f8a;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
  #sendBtn:hover{background:#15407a}
  #sendBtn:disabled{background:#b0c4d8;cursor:default}
  #sendBtn svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  footer{font-size:11px;color:#888;margin-top:10px;text-align:center}
  @media(max-width:480px){#app{height:100vh;border-radius:0;max-height:none}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
    </div>
    <div>
      <div class="header-title">나이스 플러스 도우미</div>
      <div class="header-sub">송림초등학교 교외체험학습 업무 안내</div>
    </div>
    <div class="badge">🟢 온라인</div>
  </div>

  <div id="messages"></div>

  <div class="quick-wrap" id="quickWrap">
    <button class="quick-btn" onclick="sendQuick('체험학습 신청서 접수는 어떻게 하나요?')">신청서 접수 방법</button>
    <button class="quick-btn" onclick="sendQuick('진행상태 종류를 알려주세요')">진행상태 안내</button>
    <button class="quick-btn" onclick="sendQuick('신청서 수정이 필요할 때 어떻게 하나요?')">신청서 수정 방법</button>
    <button class="quick-btn" onclick="sendQuick('권한부여는 어떻게 설정하나요?')">권한 설정 방법</button>
    <button class="quick-btn" onclick="sendQuick('보고서 취소 절차를 알려주세요')">보고서 취소 절차</button>
    <button class="quick-btn" onclick="sendQuick('교외체험학습 기준 설정 방법은?')">기준 설정 방법</button>
  </div>

  <div class="inputbar">
    <textarea id="userInput" rows="1" placeholder="나이스 체험학습 업무에 대해 질문하세요..."></textarea>
    <button id="sendBtn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>
<footer>송림초등학교 · 2024학년도 나이스 교외체험학습 업무 도우미</footer>

<script>
const API_KEY = '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';

const SYSTEM = `당신은 송림초등학교 교직원을 위한 4세대 나이스(NEIS) 교외체험학습 업무 도우미입니다.
친절하고 정확하게 답변하세요. 학교 공식 톤을 유지하되 너무 딱딱하지 않게 안내해 주세요.
모르는 내용은 모른다고 솔직히 말하고, 나이스 시스템에서 직접 확인을 권장하세요.

【메뉴 구성】
- 교외체험학습기준관리: 허용일수 및 신청 제한기간 등 기준 관리
- 교외체험학습신청서관리: 학생 신청서 목록 조회, 접수 및 승인요청 처리
- 교외체험학습보고서관리: 학생 보고서 목록 조회, 접수 및 승인요청 처리
- 교외체험학습현황관리: 신청서와 보고서 현황 통합 조회
※ 담임교사는 [학급담임-교육활동신청관리] 메뉴에서 확인 가능

【권한부여 체계】
- 4세대 나이스는 부서 업무분장별로 권한 부여 (3세대와 다름)
- 메뉴경로: 학교업무분장 → 학교업무분장관리 → 학교업무분장설정
- 학교업무분장관리 담당자가 부서/부서장 지정 → 부서장이 부서원 등록 및 권한 부여
- 학급담임은 담당 학급에 대한 학년반 자료권한 부여 필요
- 업무담당자는 학년반 전체 자료권한 필요

【권한부여 승인요청 절차】
1. 기본메뉴 → 권한관리 → 교무자료권한승인관리 접속
2. 교무년도·승인상태 확인 후 '권한관리' 선택 → 조회
3. 학년반 탭 선택 → 상신할 학년반 체크 → 승인요청 클릭
4. 기안문서상신 창에서 내용 입력 → 결재자 지정(학교장 반드시 포함) → 상신

【교외체험학습 기준관리】
- 메뉴경로: 학교행정 → 교외체험학습관리 → 교외체험학습기준관리
- 학년도 선택 → 조회 → 값 확인 → 저장 → 승인요청
- 기준은 학교별 상이, 학교장 재량 변경 가능
- 연간허용일수/신청제한기한 미지정 시 제한 없이 신청 가능
- 기준관리 적용은 결재 완료 후 적용

【교외체험학습신청서관리】
- 메뉴경로: 학교행정 → 교외체험학습관리 → 교외체험학습신청서관리
- 선행처리: 학부모서비스에서 학부모가 신청서 등록·제출
- 학년도·학년·반 선택 → 조회 (담임은 담임 학급만 조회 가능)
- 신청 유형: 온라인 직접입력 / 신청서 업로드 (2가지)
- 신청서 상세조회 후 저장 → 접수 버튼 클릭
- 누적일수/잔여일수 자동 계산 (수동 변경 가능)
- 반일신청 허용 시 전일/반일 설정 가능 (교시단위)

【진행상태 단계】
- 접수대기: 학부모가 신청서 제출한 상태
- 접수: 담임교사가 접수 처리한 상태 (학부모 수정 불가)
- 접수취소: 수정 필요 시 담임교사가 접수취소 → 학부모 수정 가능
- 상신(진행) / 상신취소 / 반려 / 완결 / 완결(기결취소)

【신청서 수정 방법】
- 접수취소 또는 접수대기 상태에서만 학부모 수정/삭제 가능
- 수정 절차: 접수 클릭 → 바로 접수취소 클릭 → 진행상태 접수취소로 변경

【교외체험학습보고서관리】
- 메뉴경로: 학교행정 → 교외체험학습관리 → 교외체험학습보고서관리
- 보고서 제출된 신청서는 취소 불가
- 취소·수정 전체 절차: 보고서기결취소 → 보고서접수취소 → 보고서삭제(학부모) → 신청서기결취소 → 신청서접수취소 → 신청서삭제(학부모)

【교외체험학습현황관리】
- 메뉴경로: 학교행정 → 교외체험학습관리 → 교외체험학습현황관리
- 교외체험학습보고서 등록건 체크 후 조회 시 신청서+보고서 모두 등록된 건만 조회
- 자료내려받기 버튼으로 파일 다운로드 가능

【전일/반일 설정】
- 각 교시단위로 설정 가능
- 사전에 교무업무 → 시간표관리 → 전체시간표관리에서 시간표별 시간 설정 필요

한국어로 답변하세요.`;

let history = [];
let isLoading = false;

window.addEventListener('DOMContentLoaded', () => {
  addBotMessage('안녕하세요! 저는 송림초등학교 나이스 플러스 체험학습 업무 도우미입니다 😊\n\n교외체험학습 신청·접수·보고서 처리, 권한 설정 등 나이스 관련 궁금한 사항을 편하게 질문해 주세요.');
  const inp = document.getElementById('userInput');
  inp.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    document.getElementById('sendBtn').disabled = !this.value.trim();
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
});

function addBotMessage(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg';
  wrap.innerHTML = `<div class="avatar"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/></svg></div><div class="bubble bot">${escHtml(text)}</div>`;
  document.getElementById('messages').appendChild(wrap);
  scroll();
}

function addUserMessage(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = `<div class="bubble user">${escHtml(text)}</div>`;
  document.getElementById('messages').appendChild(wrap);
  scroll();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg'; wrap.id = 'typing';
  wrap.innerHTML = `<div class="avatar"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/></svg></div><div class="bubble bot typing"><span></span><span></span><span></span></div>`;
  document.getElementById('messages').appendChild(wrap);
  scroll();
}

function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function scroll() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function sendQuick(text) {
  document.getElementById('quickWrap').style.display = 'none';
  document.getElementById('userInput').value = text;
  sendMessage();
}

async function sendMessage() {
  if (isLoading) return;
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('quickWrap').style.display = 'none';
  addUserMessage(text);
  history.push({ role: 'user', content: text });
  isLoading = true; showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1024, system: SYSTEM, messages: history })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content.map(b => b.text || '').join('');
    history.push({ role: 'assistant', content: reply });
    hideTyping(); addBotMessage(reply);
  } catch(e) {
    hideTyping();
    addBotMessage('오류가 발생했습니다: ' + e.message + '\n\n잠시 후 다시 시도해 주세요.');
  } finally {
    isLoading = false;
  }
}
</script>
</body>
</html>
